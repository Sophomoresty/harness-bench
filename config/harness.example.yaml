{
  "models": {
    "demo-local": {
      "adapter": "demo"
    },
    "codex-gpt-5.4-medium": {
      "adapter": "codex",
      "command": "codex",
      "user_config": "~/.codex/config.toml",
      "session_prefix": "harnessbench-codex",
      "timeout_sec": 2400,
      "model": "gpt-5.4",
      "sandbox": "workspace-write",
      "json": true,
      "stream_to_console": false,
      "config_overrides": [
        "model_reasoning_effort=\"medium\""
      ]
    },
    "nanoclaw-local": {
      "adapter": "nanoclaw",
      "command": "./scripts/bench-nanoclaw.sh",
      "session_prefix": "harnessbench-nano",
      "args": ["agent"],
      "timeout_sec": 600,
      "workspace_mount_path": "/workspace/group",
      "workdir": "."
    },
    "nanobot-local": {
      "adapter": "nanobot",
      "command": "nanobot",
      "user_config": "config/nanobot.json",
      "session_prefix": "harnessbench-nanobot",
      "no_markdown": true,
      "logs": false,
    },
    "openclaw-local": {
      "adapter": "openclaw",
      "command": "openclaw",
      "user_config": "config/openclaw.json",
      # "user_config": "~/.openclaw/openclaw.json",
      "session_prefix": "harnessbench-openclaw",
      "use_gateway": false,
      "args": ["agent", "--local"]
    },
    "openclaw-gateway": {
      "adapter": "openclaw",
      "command": "openclaw",
      "user_config": "~/.openclaw/openclaw.json",
      "session_prefix": "harnessbench",
      "use_gateway": true,
      "args": ["agent"]
    },
    "moltis-local": {
      "adapter": "moltis",
      "command": "moltis",
      "user_config": "~/.config/moltis/moltis.toml",
      "session_prefix": "harnessbench-moltis",
      "timeout_sec": 3600,
      "model": "qwen/qwen3.6-plus"
    },
    "fairyclaw-local": {
      "adapter": "fairyclaw",
      "command": "fairyclaw",
      "user_config": "config/fairyclaw",
      "session_prefix": "harnessbench-fairy",
      "timeout_sec": 2400,
      "bench_idle_seconds": 30,
      "bench_min_wait_after_send": 2
    },
    "picoclaw-local": {
      "adapter": "picoclaw",
      "command": "picoclaw",
      "user_config": "config/picoclaw.json",
      "session_prefix": "harnessbench-pico",
      "timeout_sec": 180
    },
    "zeroclaw-local": {
      "adapter": "zeroclaw",
      "command": "zeroclaw",
      "user_config": "config/zeroclaw.toml",
      "session_prefix": "harnessbench-zero",
      "timeout_sec": 180
    },
    "tinyclaw-local": {
      "adapter": "generic_cli",
      "command": "scripts/bench-tinyclaw.sh",
      "session_prefix": "harnessbench-tiny",
      "args": ["run", "--prompt-file", "{prompt_file}", "--workspace", "{workspace}", "--session-id", "{session_id}"]
    },
    "nullclaw-local": {
      "adapter": "nullclaw",
      "command": "nullclaw",
      "user_config": "config/nullclaw.json",
      "session_prefix": "harnessbench-null",
      "timeout_sec": 180
    },
    "hermes-agent": {
      "adapter": "hermes_agent",
      "command": "hermes",
      "session_prefix": "harnessbench-hermes",
      "user_config": "~/.hermes/config.yaml",
      "use_usage_proxy": true,
      "args": ["chat"]
    },
    "generic-cli": {
      "adapter": "generic_cli",
      "command": "my-agent-cli",
      "session_prefix": "harnessbench",
      "args": ["run", "--workspace", "{workspace}", "--prompt-file", "{prompt_file}"]
    }
  }
}
