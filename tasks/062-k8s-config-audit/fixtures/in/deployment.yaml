apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: storefront
  labels:
    app: checkout
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: checkout
      tier: backend
  template:
    metadata:
      labels:
        app: checkout
        tier: backend
    spec:
      containers:
        - name: checkout-api
          image: registry.internal/storefront/checkout-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          env:
            - name: LOG_LEVEL
              value: debug
