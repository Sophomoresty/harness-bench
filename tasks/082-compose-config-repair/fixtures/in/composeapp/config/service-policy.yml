services:
  api:
    image: ghcr.io/example/composeapp-api:1.4.2
    host_port: 8080
    container_port: 8000
    required_env:
      - DATABASE_URL
      - REDIS_URL
      - QUEUE_NAME
      - APP_DATA_DIR
    health_path: /healthz
    data_volume: api-data
    depends_on:
      db: service_healthy
      redis: service_healthy
  worker:
    image: ghcr.io/example/composeapp-worker:1.4.2
    required_env:
      - DATABASE_URL
      - REDIS_URL
      - QUEUE_NAME
    queue_name: critical
    depends_on:
      db: service_healthy
      redis: service_healthy
  db:
    image: postgres:16.2-alpine
    healthcheck: pg_isready
  redis:
    image: redis:7.2-alpine
    healthcheck: redis-cli ping
volumes:
  api_data_name: api-data
  api_data_target: /data
